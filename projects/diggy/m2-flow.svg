<svg xmlns="http://www.w3.org/2000/svg" width="1228" height="832" viewBox="0 0 1228 832" role="img" aria-labelledby="title desc">
  <title id="title">M2 evidence flow</title>
  <desc id="desc">Diggy M2 starts from a Kibana link or alert ID, builds an evidence pool, tests hypotheses, queries tools, and publishes an audited diagnosis.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#312974" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#592bce"/>
    </marker>
  </defs>
  <rect width="1228" height="832" fill="#f8fafc"/>
  <rect x="34" y="34" width="1160" height="764" rx="34" fill="#ffffff" stroke="#d7dce5"/>
  <circle cx="1060" cy="120" r="170" fill="#eee7fa" opacity="0.65"/>
  <text x="82" y="100" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="800" fill="#312974">M2 锚点诊断</text>
  <text x="82" y="142" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" fill="#56657c">逐轮取证，收敛结果；结论必须被原始日志引用支撑</text>

  <g filter="url(#shadow)">
    <rect x="82" y="214" width="236" height="128" rx="20" fill="#ffffff" stroke="#d7dce5"/>
    <text x="112" y="257" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#592bce">ENTRY</text>
    <text x="112" y="292" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="23" font-weight="800" fill="#152033">Kibana 链接</text>
    <text x="112" y="322" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#56657c">告警 ID / traceId</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="402" y="190" width="280" height="176" rx="20" fill="#ffffff" stroke="#d7dce5"/>
    <text x="432" y="234" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#592bce">EVIDENCE POOL</text>
    <text x="432" y="272" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="800" fill="#152033">建立证据池</text>
    <text x="432" y="308" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#56657c">原始日志 / traceId</text>
    <text x="432" y="338" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#56657c">错误信息 / 实例列表</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="774" y="184" width="330" height="188" rx="20" fill="#ffffff" stroke="#d7dce5"/>
    <text x="804" y="228" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#592bce">HYPOTHESIS LOOP</text>
    <text x="804" y="266" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="800" fill="#152033">提出假设并取证</text>
    <text x="804" y="304" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#56657c">必须带 hypothesis + gap</text>
    <text x="804" y="334" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#56657c">调用 ES / AKS / mock tools</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="208" y="510" width="306" height="158" rx="20" fill="#ffffff" stroke="#d7dce5"/>
    <text x="238" y="554" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#0e7490">VERIFY</text>
    <text x="238" y="592" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="800" fill="#152033">推翻或支持假设</text>
    <text x="238" y="630" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#56657c">证据不足则继续取证</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="648" y="510" width="330" height="158" rx="20" fill="#ffffff" stroke="#d7dce5"/>
    <text x="678" y="554" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="800" fill="#15803d">REPORT</text>
    <text x="678" y="592" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="800" fill="#152033">发布诊断报告</text>
    <text x="678" y="630" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" fill="#56657c">report.md + audit.jsonl</text>
  </g>

  <path d="M 318 278 L 394 278" stroke="#592bce" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 682 278 L 766 278" stroke="#592bce" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 936 372 C 930 452 610 450 514 556" stroke="#592bce" stroke-width="5" fill="none" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 514 590 L 640 590" stroke="#592bce" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 364 510 C 344 442 482 408 804 370" stroke="#7f51db" stroke-width="4" fill="none" stroke-dasharray="10 12" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="82" y="724" width="1064" height="42" rx="21" fill="#eee7fa"/>
  <text x="112" y="752" font-family="Inter, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="700" fill="#312974">核心原则：LLM 负责理解与策略，确定性代码负责事实、流程、校验与审计。</text>
</svg>
