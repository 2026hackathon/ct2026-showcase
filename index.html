<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CT 2026 Hackathon · 项目一览</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel-2:#1c232d; --border:#2a313c;
    --text:#e6edf3; --muted:#9aa7b4; --faint:#6b7785; --accent:#58a6ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.65;-webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:60px 28px 90px}
  header.hero{margin-bottom:40px}
  header.hero h1{font-size:30px;font-weight:800;letter-spacing:-.5px}
  header.hero p{color:var(--faint);margin-top:8px;font-size:14px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
  a.card{
    display:block;text-decoration:none;color:inherit;
    background:var(--panel);border:1px solid var(--border);border-radius:16px;
    padding:22px 22px 20px;position:relative;overflow:hidden;
    transition:transform .15s,border-color .15s,background .15s;
  }
  a.card::before{content:"";position:absolute;inset:0 auto 0 0;width:4px;background:var(--clr)}
  a.card:hover{transform:translateY(-3px);border-color:var(--clr);background:var(--panel-2)}
  .card .row1{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .card .seq{
    width:24px;height:24px;flex-shrink:0;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:var(--clr);
    background:var(--bg);border:1px solid var(--clr);
  }
  .card .medal{font-size:18px;line-height:1}
  .card .team{font-size:11.5px;color:var(--faint);letter-spacing:.4px}
  .card h2{font-size:20px;font-weight:800;color:var(--clr);margin:2px 0 8px}
  .card .tag{font-size:13.5px;color:var(--muted);min-height:38px}
  .card .ft{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
  .card .ft .who{font-size:12px;color:var(--faint)}
  .card .ft .who b{color:var(--clr)}
  .card .ft .go{font-size:13px;color:var(--clr);font-weight:600}

  .award-banner{
    display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;
    padding:3px 10px;border-radius:999px;border:1px solid;margin-left:auto;
  }
  .award-gold{color:#f7d774;border-color:rgba(247,215,116,.5);background:rgba(247,215,116,.12)}
  .award-silver{color:#cfd8e3;border-color:rgba(207,216,227,.5);background:rgba(207,216,227,.12)}
  .award-bronze{color:#e0a06a;border-color:rgba(224,160,106,.5);background:rgba(224,160,106,.12)}
  .award-ai{color:#7ee0c8;border-color:rgba(126,224,200,.5);background:rgba(126,224,200,.12)}

  footer{margin-top:48px;color:var(--faint);font-size:12.5px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>CT 2026 Hackathon · 项目一览</h1>
    <p>按路演顺序排列 · 点击任意项目查看详情、图片与 Demo</p>
  </header>
  <div class="grid" id="grid"></div>
  <footer>每个项目的内容由各队自行维护 · 详见 <code>projects/README.md</code></footer>
</div>

<script src="projects/manifest.js"></script>
<script>
  const TEAMS=(window.TEAMS||[]).slice().sort((a,b)=>(a.order||999)-(b.order||999));
  const grid=document.getElementById("grid");
  TEAMS.forEach(t=>{
    const a=document.createElement("a");
    a.className="card";
    a.href="team.html?p="+encodeURIComponent(t.id);
    a.style.setProperty("--clr",t.color);
    const medal=t.award?`<span class="medal">${t.award.icon}</span>`:"";
    const award=t.award?`<span class="award-banner award-${t.award.rank}">${t.award.label}</span>`:"";
    a.innerHTML=`
      <div class="row1"><span class="seq">${t.order}</span>${medal}
        <span class="team">${t.team}</span>${award}</div>
      <h2>${t.product}</h2>
      <div class="tag">${t.tagline}</div>
      <div class="ft">
        <span class="who">${(t.members||[]).length} 人 · 路演 <b>${t.presenter}</b></span>
        <span class="go">查看详情 →</span>
      </div>`;
    grid.appendChild(a);
  });
  if(TEAMS.length===0){grid.innerHTML='<p style="color:var(--faint)">没有读到 projects/manifest.js</p>';}
</script>
</body>
</html>
